<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>video and links</title>
</head>
<body>]
    <h1>Video and Links</h1>
    <video width="320" height="240" controls loop autoplay muted poster="poster.jpg">
        <source src="movie.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <p><a href="https://www.example.com">Visit Example.com</a></p>
    <audio controls loop autoplay>
        <source src="audio.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    <iframe src="https://youtu.be/7fsb6ZESyzE?si=XAs5tdIYvnT9lvCa 12:30" width="600" height="400">
        Your browser does not support the iframe element.
    </iframe>
</body>
